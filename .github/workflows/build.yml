name: Build Creator Empire APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        run: |
          mkdir -p build
          mkdir -p ~/.config/godot
          mkdir -p ~/.local/share/godot/export_templates/4.3.stable
          # Link export templates from the Docker image
          cp /root/.local/share/godot/export_templates/4.3.stable/* ~/.local/share/godot/export_templates/4.3.stable/ 2>/dev/null || true
          ls ~/.local/share/godot/export_templates/4.3.stable/
          # Create debug keystore
          keytool -genkeypair -v -keystore /root/debug.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=Debug,O=Debug,C=US" 2>/dev/null || true
          # Editor settings
          printf '[gd_resource type="EditorSettings" format=3]\n\n[resource]\nexport/android/android_sdk_path = "/usr/lib/android-sdk"\nexport/android/debug_keystore = "/root/debug.keystore"\nexport/android/debug_keystore_user = "androiddebugkey"\nexport/android/debug_keystore_pass = "android"\n' > ~/.config/godot/editor_settings-4.tres

      - name: Create export presets
        run: |
          cat > export_presets.cfg << 'EOF'
          [preset.0]
          name="Android"
          platform="Android"
          runnable=true
          dedicated_server=false
          custom_features=""
          export_filter="all_resources"
          include_filter=""
          exclude_filter=""
          export_path="build/creator-empire.apk"
          [preset.0.options]
          custom_template/debug=""
          custom_template/release=""
          gradle_build/use_gradle_build=false
          gradle_build/export_format=0
          architectures/armeabi-v7a=false
          architectures/arm64-v8a=true
          architectures/x86=false
          architectures/x86_64=false
          version/code=1
          version/name="1.0.0"
          package/unique_name="com.creatorempire.game"
          package/name="Creator Empire"
          package/signed=true
          package/classify_as_game=true
          screen/immersive_mode=true
          EOF
          sed -i 's/^          //' export_presets.cfg

      - name: Import
        run: godot --headless --import 2>&1 || true

      - name: Export APK
        run: godot --headless --export-debug "Android" build/creator-empire.apk 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: creator-empire-apk
          path: build/creator-empire.apk
